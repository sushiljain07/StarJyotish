name: CI

# Runs on every push and PR against main.
#
# The backend job spins up a real Postgres service so the full suite runs,
# not just the subset that works without a database — tests/test_auth.py
# and tests/test_db_repositories.py (30 tests) otherwise self-skip via
# pytest.mark.skipif when DATABASE_URL is unset, which is the right default
# for a contributor's laptop but would silently hide real regressions if CI
# ran the same way. test_db_repositories.py creates its own tables via
# Base.metadata.create_all(); test_auth.py goes through the actual FastAPI
# routes and expects the real schema, so migrations are applied first.
# No real secrets are needed: JWT_SECRET_KEY/OTP_HASH_SECRET just need to
# be *some* non-empty string, and DATABASE_URL points at the ephemeral
# CI-only Postgres container, not anything real.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: starjyotish_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/starjyotish_test
      JWT_SECRET_KEY: ci-only-secret-not-for-production-use
      OTP_HASH_SECRET: ci-only-otp-secret-not-for-production-use
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run test suite
        run: pytest tests/ -v

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
