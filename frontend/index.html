    <!-- Static fallback meta tags for non-JS consumers that read the initial
         HTML before main.jsx hydrates and react-helmet-async (see Seo.jsx)
         injects the real per-page tags. Deliberately excludes canonical and
         og:url: those are route-identity values, and a hardcoded homepage
         URL would be wrong on every other route — confirmed via a real
         Lighthouse run that this previously produced two conflicting
         canonical-link elements on every non-home page (Helmet adds its own
         tag rather than replacing a static one it didn't create). Helmet is
         the sole source of those two values on every route, including this
         one. -->
    <meta name="description" content="Free Vedic Kundli with Swiss Ephemeris-accurate calculations and an AI-powered reading. Career, relationship, health & wealth insights in English and Hindi." />
