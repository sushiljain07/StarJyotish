<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/starjyotish.svg" />
    <!-- PNG fallback specifically for Google Search's favicon: Google's
         guidelines (developers.google.com/search/docs/appearance/favicon-in-search)
         require a square icon and recommend PNG/ICO over SVG for reliability
         in the search-results favicon (SVG-only is the most common reason a
         site falls back to Google's generic globe icon). Reuses icon-192.png,
         already shipped for the PWA manifest, well above the 48x48 minimum. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#171B33" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Jyotish — AI-Powered Vedic Astrology</title>
    <!-- Static fallback meta tags for non-JS consumers that read the initial
         HTML before main.jsx hydrates and react-helmet-async (see Seo.jsx)
         injects the real per-page tags. Deliberately excludes canonical and
         og:url: those are route-identity values, and a hardcoded homepage
         URL would be wrong on every other route — confirmed via a real
         Lighthouse run that this previously produced two conflicting
         canonical-link elements on every non-home page (Helmet adds its own
         tag rather than replacing a static one it didn't create). Helmet is
         the sole source of those two values on every route, including this
         one. -->
    <meta name="description" content="Free Vedic Kundli with Swiss Ephemeris-accurate calculations and an AI-powered reading. Career, relationship, health & wealth insights in English and Hindi." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Star Jyotish — AI-Powered Vedic Astrology" />
    <meta property="og:description" content="Free Vedic Kundli with Swiss Ephemeris-accurate calculations and an AI-powered reading, in English and Hindi." />
    <meta property="og:image" content="https://starjyotish.com/starjyotish-logo.webp" />
    <meta property="og:site_name" content="Star Jyotish" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Star Jyotish — AI-Powered Vedic Astrology" />
    <meta name="twitter:description" content="Free Vedic Kundli with Swiss Ephemeris-accurate calculations and an AI-powered reading, in English and Hindi." />
    <meta name="twitter:image" content="https://starjyotish.com/starjyotish-logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
    <!-- Organization + WebSite structured data. Static (not via Helmet) since
         it's identical on every route, unlike the per-page Seo.jsx tags.
         Deliberately omits:
         - WebSite.potentialAction (SearchAction): there's no on-site search
           endpoint to point it at; a SearchAction schema for a feature that
           doesn't exist is the kind of mismatch Google's guidelines flag.
         - Organization.sameAs: no official Star Jyotish social/profile URLs
           exist yet. Add them here once they do (e.g. a real X/LinkedIn/
           Instagram account for the brand, not a personal GitHub profile). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://starjyotish.com/#organization",
            "name": "Star Jyotish",
            "url": "https://starjyotish.com",
            "logo": "https://starjyotish.com/starjyotish-logo.webp",
            "description": "AI-powered Vedic astrology platform offering free, Swiss Ephemeris-accurate birth charts and personalized readings in English and Hindi."
          },
          {
            "@type": "WebSite",
            "@id": "https://starjyotish.com/#website",
            "url": "https://starjyotish.com",
            "name": "Star Jyotish",
            "publisher": { "@id": "https://starjyotish.com/#organization" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
