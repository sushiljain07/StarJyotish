<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d2b55"/>
      <stop offset="100%" stop-color="#0d0b1e"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Outer dashed orbit ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#4f46e5" stroke-width="0.5" stroke-dasharray="2.5 2" opacity="0.55"/>

  <!-- ── Neural-network / constellation lines ── -->
  <!-- 8 nodes clockwise from top on r=40:
       N0(50,10)  N1(78.28,21.72)  N2(90,50)  N3(78.28,78.28)
       N4(50,90)  N5(21.72,78.28)  N6(10,50)  N7(21.72,21.72) -->

  <!-- Outer polygon (adjacent connections) -->
  <polygon points="50,10 78.28,21.72 90,50 78.28,78.28 50,90 21.72,78.28 10,50 21.72,21.72"
           fill="none" stroke="#6366f1" stroke-width="0.75" opacity="0.5"/>

  <!-- Skip-2 connections (like hidden-layer edges in a neural net / constellation diagonals) -->
  <line x1="50"    y1="10"    x2="90"    y2="50"    stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="78.28" y1="21.72" x2="78.28" y2="78.28" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="90"    y1="50"    x2="50"    y2="90"    stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="78.28" y1="78.28" x2="10"    y2="50"    stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="50"    y1="90"    x2="21.72" y2="21.72" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="21.72" y1="78.28" x2="50"    y2="10"    stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="10"    y1="50"    x2="78.28" y2="21.72" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="21.72" y1="21.72" x2="90"    y2="50"    stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>

  <!-- Spoke lines: cardinal nodes → center (AI hub-spoke) -->
  <line x1="50" y1="10" x2="50" y2="50" stroke="#a5b4fc" stroke-width="0.4" opacity="0.2"/>
  <line x1="90" y1="50" x2="50" y2="50" stroke="#a5b4fc" stroke-width="0.4" opacity="0.2"/>
  <line x1="50" y1="90" x2="50" y2="50" stroke="#a5b4fc" stroke-width="0.4" opacity="0.2"/>
  <line x1="10" y1="50" x2="50" y2="50" stroke="#a5b4fc" stroke-width="0.4" opacity="0.2"/>

  <!-- Node dots (stars on the constellation / neurons on the network) -->
  <circle cx="50"    cy="10"    r="2.5" fill="#c7d2fe" filter="url(#nodeGlow)"/>
  <circle cx="78.28" cy="21.72" r="2"   fill="#818cf8" filter="url(#nodeGlow)"/>
  <circle cx="90"    cy="50"    r="2.5" fill="#a5b4fc" filter="url(#nodeGlow)"/>
  <circle cx="78.28" cy="78.28" r="2"   fill="#818cf8" filter="url(#nodeGlow)"/>
  <circle cx="50"    cy="90"    r="2.5" fill="#c7d2fe" filter="url(#nodeGlow)"/>
  <circle cx="21.72" cy="78.28" r="2"   fill="#818cf8" filter="url(#nodeGlow)"/>
  <circle cx="10"    cy="50"    r="2.5" fill="#a5b4fc" filter="url(#nodeGlow)"/>
  <circle cx="21.72" cy="21.72" r="2"   fill="#818cf8" filter="url(#nodeGlow)"/>

  <!-- ── Central 8-pointed Vedic star (Ashtabhuja) ── -->
  <!-- Outer R=18, inner r=8, alternating 8 outer + 8 inner points -->
  <path d="M50,32 L53.06,42.61 L62.73,37.27 L57.39,46.94
           L68,50 L57.39,53.06 L62.73,62.73 L53.06,57.39
           L50,68 L46.94,57.39 L37.27,62.73 L42.61,53.06
           L32,50 L42.61,46.94 L37.27,37.27 L46.94,42.61 Z"
        fill="#f59e0b" filter="url(#starGlow)"/>

  <!-- Star center glow -->
  <circle cx="50" cy="50" r="8"  fill="url(#coreGrad)" filter="url(#starGlow)"/>
  <circle cx="50" cy="50" r="3.5" fill="#ffffff"/>
</svg>
